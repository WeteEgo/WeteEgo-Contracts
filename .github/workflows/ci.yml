name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  forge-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Install dependencies
        run: forge install
      - name: Build
        run: forge build

  forge-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Install dependencies
        run: forge install
      - name: Run tests
        run: forge test -vvv

  slither-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Install dependencies
        run: forge install
      - name: Build
        run: forge build
      - name: Install Slither
        run: pip3 install slither-analyzer
      - name: Run Slither
        run: slither src/ --fail-on high

  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - name: Run Snyk
        uses: snyk/actions/solidity@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
